  CP6 iter-7 designer response committed; handing back to codex.

  iter-6 filed a defensible exception against codex iter-5
  Finding 03 (BLOCKER — D11 / D13 SR-14a strict schematic-overlap
  audit). User pivoted: "I agree with claude that there are lots of
  overlaps. assume they are not false positives." iter-7 reverses
  the exception strategy and structurally fixes the overlaps at
  the source in hardware/kicad/build_schematics.py.

  Result: 290 audit pairs → 50 pairs (-83 %). Battery 206 → 28,
  display 84 → 22.

  Categories addressed:
  1. (pin_names hide) on multi-pin ICs + connectors — eliminates
     stacked GND/GND pin-name clusters on DS3231M, ESP32, and pin-
     name-vs-label duplicates on LTC2850xS8/TPS62933/connectors.
  2. Hide Reference + Value on the embedded libSymbol template —
     stops template text from being rendered on top of the
     instance text at the same coordinate.
  3. (pin_numbers hide) on 2/3-pin discretes + power flag +
     button + stacked-power-pin chips — eliminates pin-number-vs-
     Value-text overlaps on caps/resistors/diodes and pin-number-
     stack pairs on multi-GND chips.
  4. Hide pin names on D, D_TVS, LED, Battery_Cell — the symbol
     shape conveys polarity, so A/K/+/- names just clutter.
  5. Wider stubs (8 G horizontal / 4 G vertical) on RS485 chip
     pins and 8 G on 1×4 dev headers — GlobalLabel chevron tips
     now sit a full grid step clear of pin-number bboxes.
  6. value_pos / ref_pos overrides on F1 (fuse), U1/U2 Recom
     converters, U3 RS485, MOD1 ESP32 — moves Reference / Value
     text out of pin-number / label bbox neighborhoods.

  Residual 50 pairs split as:
  - ~26 KiCad stroke-font PDF artifacts (identical text at the
    exact same bbox; rendered once visually, surfaced as two PyMuPDF
    spans by KiCad's PDF exporter behavior).
  - ~24 small chevron-tip / label-cluster touches (intersection
