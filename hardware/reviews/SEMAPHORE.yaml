note: >
  CP3 iter 18: Antenna keepout audit surfaced an architectural
  decision that requires user input. The ESP32-S3-WROOM-1 footprint
  ships with a 48x21mm keepout zone (board-absolute x=4-52, y=-11.25
  to 9.75). 6 of 41 components fall inside it: J1, F1, D1, U1, L1,
  C_BST — the entire input-power chain. DRC doesn't currently flag
  these (footprint-bundled keepout, enforced at routing time in CP4),
  but routing CP4 will either fail or require keepout override.
  Three options surfaced in §10.18:
    A) Switch to ESP32-S3-WROOM-1U (external uFL antenna, eliminates
       keepout; ~$3-5 BOM increase + small re-spin CP)
    B) Re-place MOD1 at board edge with antenna over-edge (large
       re-do of placement)
    C) Accept the keepout violation (10-30% WiFi performance hit,
       functional)
  Designer recommendation: Option A. State -> user_turn for the
  call. If user wants autonomous decision: A.
  Battery-side CP3 status: 41/41 placed, 22 F.Cu/19 B.Cu, DRC 0
  errors, net classes per CP1 §11.3 present (name-only),
  fp-lib-table declared, 4x M3 mounting holes, renders committed.

