note: >
  CP6 iter-8 in progress (D16 schematic-readability rework).

  iter-7 closed with 50 audit pairs and a tactical fix. User reviewed
  the grayscale renders and asserted: "neither schematic is human
  readable". New top-level requirement landed:

      "A human can read this schematic and understand the design."

  Codified in decisions.md as D11 (strengthened — exception path
  revoked) + D16 (new). The hard rule is: any overlapping text,
  symbol, label box, chevron, pin name, pin number, junction, wire,
  or graphical annotation is to be revised until it is not present.
  No exception path. iter-8 is a multi-step rework toward that bar.

  Progress in this commit:
  1. decisions.md D11 strengthened (top-level goal added, #0a
     exception path revoked).
  2. decisions.md D16 added documenting the new top-level
     readability goal + the user directive that triggered it.
  3. build_schematics.py: every GND connection now routes through
     a stock KiCad GND power port (downward-triangle glyph) instead
     of a flag-shaped GlobalLabel. Helper `_place_power_port` added;
     `_pin_label` auto-routes the four standard supply nets (GND,
     +3V3, +12V, +24V) through it. Pin numbers hidden on the power-
     port symbols themselves (the glyph is self-evident).
  4. Direct `_place_label("GND", ...)` call sites (U1 TPS62933,
     Q2 NMOS, RTC1, U3 RS485 battery, BTN1, U2 RS485 display, BTN
     loop on display side) converted to `_place_power_port`.
  5. ERC: 0 errors / 0 warnings on both boards.

  Additional commits in this iter-8 push (95051af, 0098522):
  - BTN1 (battery) + BTN1/2/3 (display) debounce clusters
    restructured to "single trunk wire connects BTN → R → C, R
    above trunk pulls to V3V3, C below trunk debounces to GND".
    Reader sees the topology in one glance instead of mentally
    splicing three "BTN_OVERRIDE" / "BTN<N>_IN" labels.
  - Q1 / Q2 MOSFET gate stubs extended from 2 G → 4 G so the
    GlobalLabel chevron tip clears the in-symbol G/D/S pin-name
    text.
  - L1 inductor Value text relocated 2 G right of default so it
    no longer touches pin 2 number bbox.
  - Documentation propagation commit (9bc46f9): DESIGNER.md §0
    now leads with the D16 verbatim goal + a "Schematic-readiness
    checklist (D16 acceptance bar)" listing the five operational
    items (real cluster wires, stock power-port symbols, visible
    pin numbers with lib-level stack fixes, functional-block
    grouping with signal flow, zero on the strict overlap audit);
    REVIEWER.md §4 updated with the matching reviewer-side D16
    policy; decisions.md "Portability for future PCB projects"
    expanded so a fresh Claude/Codex instance forking this
    template inherits both D11 and D16 verbatim.

