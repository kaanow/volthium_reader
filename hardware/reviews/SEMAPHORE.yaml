  Impediments / deferred for follow-on:
  - **BTN1 (battery) / BTN1-3 (display) debounce clusters**:
    Tried trunk-wire pattern (BTN.pin1 → R.pin2 → C.pin1).
    KiCad's ERC flags wires whose endpoint coincides with a pin
    inside a SW_Push body as `wire_dangling`. Pattern works on
    every other 2-pin discrete (R, C, D, L, Fuse, Polyfuse) but
    not on SW_Push. Root cause appears to be the SW_Push lib
    pin geometry (length 2.54 mm pin with the connection point
    INSIDE the body). Reverted to per-pin labels for these
    clusters. Fixing requires lib-symbol pin-geometry edit
    (move SW_Push pin's connection point to the body edge or
    add an explicit junction at the wire-meets-pin point);
    needs deliberate library work and visual confirmation that
    the resulting body geometry is correct.
  - Cross-cluster wire elimination (V3V3_SW connecting RTC / I²C
    pull-ups / bypass caps / U3 across the sheet): per-net
    wiring would require long visual wires that pass over /
    around other clusters. The trade-off is visual locality vs
    explicit electrical wires. Deferred.
  - Whole-sheet functional-block visual restructure (re-flowing
    the schematic so power-input → regulator → MCU → peripherals
    flow visibly left-to-right with section boundaries). Would
    require substantial component-position rework and risks
    breaking the audit-zero state achieved here. Deferred.

