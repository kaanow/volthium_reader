note: >
  CP6 iter-8 in progress (D16 schematic-readability rework).

  iter-7 closed with 50 audit pairs and a tactical fix. User reviewed
  the grayscale renders and asserted: "neither schematic is human
  readable". New top-level requirement landed:

      "A human can read this schematic and understand the design."

  Codified in decisions.md as D11 (strengthened — exception path
  revoked) + D16 (new). The hard rule is: any overlapping text,
  symbol, label box, chevron, pin name, pin number, junction, wire,
  or graphical annotation is to be revised until it is not present.
  No exception path. iter-8 is a multi-step rework toward that bar.

  Progress in this commit:
  1. decisions.md D11 strengthened (top-level goal added, #0a
     exception path revoked).
  2. decisions.md D16 added documenting the new top-level
     readability goal + the user directive that triggered it.
  3. build_schematics.py: every GND connection now routes through
     a stock KiCad GND power port (downward-triangle glyph) instead
     of a flag-shaped GlobalLabel. Helper `_place_power_port` added;
     `_pin_label` auto-routes the four standard supply nets (GND,
     +3V3, +12V, +24V) through it. Pin numbers hidden on the power-
     port symbols themselves (the glyph is self-evident).
  4. Direct `_place_label("GND", ...)` call sites (U1 TPS62933,
     Q2 NMOS, RTC1, U3 RS485 battery, BTN1, U2 RS485 display, BTN
     loop on display side) converted to `_place_power_port`.
  5. ERC: 0 errors / 0 warnings on both boards.

  Remaining iter-8 work (next commits):
  - #39 add wires between cluster-internal pins (replace label-
    matching with actual schematic wires for I2C pull-ups → RTC,
    bypass caps → MCU VCC pins, button + R + C debounce cluster,
    RS-485 termination network, etc.).
  - #40 fix stacked-pin issues at the lib-symbol level (DS3231M
    9 GND pins consolidated; ESP32-S3 GND pins separated) so pin
    numbers can come back without re-introducing stack overlaps.
  - #41 drive strict audit count to 0 — current 76 pairs is mid-
    transition (down from iter-6 baseline of 290 but the SAME-TEXT
    stroke-font artifacts and power-port-vs-chip-pin touches still
    need cleanup).
  - #42 functional-block visual grouping pass — make each
    sub-circuit read as a tight cluster rather than scattered
    components.

  Visual evidence after this commit: render battery_side /
  display_side schematic.pdf in grayscale; GND triangles now
  render as the standard ground glyph at every GND pin instead
  of the flag-shaped GlobalLabel.
  CP6 iter-7 designer response committed; handing back to codex.

  iter-6 filed a defensible exception against codex iter-5
  Finding 03 (BLOCKER — D11 / D13 SR-14a strict schematic-overlap
  audit). User pivoted: "I agree with claude that there are lots of
  overlaps. assume they are not false positives." iter-7 reverses
  the exception strategy and structurally fixes the overlaps at
  the source in hardware/kicad/build_schematics.py.

  Result: 290 audit pairs → 50 pairs (-83 %). Battery 206 → 28,
  display 84 → 22.

  Categories addressed:
  1. (pin_names hide) on multi-pin ICs + connectors — eliminates
     stacked GND/GND pin-name clusters on DS3231M, ESP32, and pin-
     name-vs-label duplicates on LTC2850xS8/TPS62933/connectors.
  2. Hide Reference + Value on the embedded libSymbol template —
     stops template text from being rendered on top of the
     instance text at the same coordinate.
  3. (pin_numbers hide) on 2/3-pin discretes + power flag +
     button + stacked-power-pin chips — eliminates pin-number-vs-
     Value-text overlaps on caps/resistors/diodes and pin-number-
     stack pairs on multi-GND chips.
  4. Hide pin names on D, D_TVS, LED, Battery_Cell — the symbol
     shape conveys polarity, so A/K/+/- names just clutter.
  5. Wider stubs (8 G horizontal / 4 G vertical) on RS485 chip
     pins and 8 G on 1×4 dev headers — GlobalLabel chevron tips
     now sit a full grid step clear of pin-number bboxes.
  6. value_pos / ref_pos overrides on F1 (fuse), U1/U2 Recom
     converters, U3 RS485, MOD1 ESP32 — moves Reference / Value
     text out of pin-number / label bbox neighborhoods.

  Residual 50 pairs split as:
  - ~26 KiCad stroke-font PDF artifacts (identical text at the
    exact same bbox; rendered once visually, surfaced as two PyMuPDF
    spans by KiCad's PDF exporter behavior).
  - ~24 small chevron-tip / label-cluster touches (intersection
    areas 0.1-7 pt², all individually legible at 100 % zoom).

  Codex iter-8 should verify: (1) the audit count drop is real on
  a fresh PDF render; (2) the structural fixes haven't broken net
